<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciador Financeiro (50/30/20)</title>
    <style>
        /* Reset de estilos básicos */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121214;
            color: #e1e1e6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Container Principal */
        .container {
            background-color: #202024;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            border: 1px solid #323238;
        }

        h1 {
            font-size: 1.8rem;
            text-align: center;
            margin-bottom: 1.5rem;
            color: #00b37e;
        }

        /* Formulário e Inputs */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        label {
            font-size: 0.9rem;
            color: #c4c4cc;
            font-weight: 600;
        }

        input[type="number"] {
            background-color: #121214;
            border: 1px solid #323238;
            padding: 0.8rem;
            border-radius: 6px;
            color: #fff;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #00b37e;
        }

        /* Botão */
        button {
            width: 100%;
            background-color: #00b37e;
            color: #fff;
            border: none;
            padding: 1rem;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: #00875f;
        }

        button:active {
            transform: scale(0.98);
        }

        /* Área de Resultados */
        #saida {
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .resultado-item {
            display: flex;
            justify-content: space-between;
            background-color: #29292e;
            padding: 0.8rem 1rem;
            border-radius: 6px;
            border-left: 4px solid #323238;
        }

        /* Cores específicas para cada categoria */
        .necessidades { border-left-color: #3b82f6; }
        .desejos { border-left-color: #f59e0b; }
        .investimentos { border-left-color: #10b981; }

        .resultado-item span:last-child {
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Gerenciador 50/30/20</h1> 
        
        <div class="input-group">
            <label for="valor">Valor Total (R$)</label>
            <input type="number" id="valor" name="valor" placeholder="Ex: 3000" min="0" step="0.01">
        </div>

        <button onclick="calcular()">Calcular</button>

        <div id="saida"></div>
    </div>

    <script>
        function calcular() {
            const valorInput = document.getElementById('valor').value;
            const valor = parseFloat(valorInput);

            // Validação simples para evitar campos vazios ou negativos
            if (isNaN(valor) || valor <= 0) {
                document.getElementById('saida').innerHTML = `<p style="color: #f75a68; text-align: center;">Por favor, insira um valor válido.</p>`;
                return;
            }
            
            const necessidades = valor * 0.5;
            const desejos = valor * 0.3;
            const investimentos = valor * 0.2;
            
            document.getElementById('saida').innerHTML = `
                <div class="resultado-item necessidades">
                    <span>Necessidades (50%):</span>
                    <span>R$ ${necessidades.toFixed(2)}</span>
                </div>
                <div class="resultado-item desejos">
                    <span>Desejos (30%):</span>
                    <span>R$ ${desejos.toFixed(2)}</span>
                </div>
                <div class="resultado-item investimentos">
                    <span>Investimentos (20%):</span>
                    <span>R$ ${investimentos.toFixed(2)}</span>
                </div>
            `;
        }
    </script>
</body>
</html>
